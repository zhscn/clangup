name: libcxx channel

on:
  workflow_dispatch:

concurrency:
  group: libcxx-channel
  cancel-in-progress: false

env:
  CHANNEL_ROOT: channels/libcxx/22.1.8
  DOWNLOAD_ROOT: https://dl.clangup.dev
  BUILDER_IMAGE: ghcr.io/zhscn/clangup-builder:1
  BOOTSTRAP_CHANNEL: default
  BOOTSTRAP_EXACT: 22.1.8-1

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      source_url: ${{ steps.plan.outputs.source_url }}
      source_sha256: ${{ steps.plan.outputs.source_sha256 }}
      source_date_epoch: ${{ steps.plan.outputs.source_date_epoch }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve channel release
        run: |
          mkdir -p out/plan
          go run ./cmd/channel-plan "$CHANNEL_ROOT/release.yaml" out/plan/channel-plan.json
      - name: Export build inputs
        id: plan
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open("out/plan/channel-plan.json", encoding="utf-8") as file:
              plan = json.load(file)
          print(f"source_url={plan['source']['url']}")
          print(f"source_sha256={plan['source']['sha256']}")
          PY
          echo "source_date_epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: libcxx-plan
          path: out/plan/channel-plan.json
          if-no-files-found: error
          retention-days: 7

  linux:
    name: build ${{ matrix.triple }}
    needs: plan
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            profile: el7
            arch: amd64
            runner: ubuntu-24.04
            verify_image: quay.io/centos/centos:7
          - triple: aarch64-unknown-linux-gnu
            profile: el8
            arch: arm64
            runner: ubuntu-24.04-arm
            verify_image: quay.io/centos/centos:8
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/share/powershell /usr/lib/jvm /opt/microsoft || true
          docker image prune -af || true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: libcxx-plan
          path: out/plan
      - name: Download source
        env:
          SOURCE_URL: ${{ needs.plan.outputs.source_url }}
          SOURCE_SHA256: ${{ needs.plan.outputs.source_sha256 }}
        run: |
          mkdir -p .cache/sources
          curl -fsSL -o .cache/sources/llvm-project.tar.xz "$SOURCE_URL"
          echo "$SOURCE_SHA256  .cache/sources/llvm-project.tar.xz" | sha256sum -c -
      - name: Download bootstrap toolchain
        id: toolchain
        env:
          TARGET: ${{ matrix.triple }}
        run: |
          release_url="$DOWNLOAD_ROOT/releases/$BOOTSTRAP_CHANNEL/$BOOTSTRAP_EXACT/release.json"
          mkdir -p .cache/bootstrap
          curl -fsSL -o .cache/bootstrap-release.json "$release_url"
          artifact_key="$(jq -er --arg target "$TARGET" '.artifacts[] | select(.target == $target) | .artifact.key' .cache/bootstrap-release.json)"
          artifact_sha256="$(jq -er --arg target "$TARGET" '.artifacts[] | select(.target == $target) | .artifact.sha256' .cache/bootstrap-release.json)"
          curl -fsSL -o .cache/bootstrap.tar.zst "$DOWNLOAD_ROOT/$artifact_key"
          echo "$artifact_sha256  .cache/bootstrap.tar.zst" | sha256sum -c -
          tar --use-compress-program=unzstd -xf .cache/bootstrap.tar.zst -C .cache/bootstrap
          echo "identity=$BOOTSTRAP_CHANNEL@$BOOTSTRAP_EXACT#$TARGET:sha256:$artifact_sha256" >> "$GITHUB_OUTPUT"
      - name: Resolve builder image
        id: builder
        env:
          IMAGE: ${{ env.BUILDER_IMAGE }}
          ARCH: ${{ matrix.arch }}
        run: |
          index_digest="$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}' | jq -er .digest)"
          platform_digest="$(docker buildx imagetools inspect "$IMAGE" --raw | jq -er --arg arch "$ARCH" '.manifests[] | select(.platform.os == "linux" and .platform.architecture == $arch) | .digest')"
          echo "ref=${IMAGE%:*}@$index_digest" >> "$GITHUB_OUTPUT"
          echo "identity=${IMAGE%:*}@$index_digest#$platform_digest" >> "$GITHUB_OUTPUT"
      - name: Build target
        env:
          SOURCE_DATE_EPOCH: ${{ needs.plan.outputs.source_date_epoch }}
          BOOTSTRAP_IDENTITY: ${{ steps.toolchain.outputs.identity }}
          BUILD_ENVIRONMENT_IDENTITY: ${{ steps.builder.outputs.identity }}
        run: |
          mkdir -p ".cache/build-${{ matrix.arch }}" "out/${{ matrix.triple }}"
          docker run --rm --network none \
            --mount type=bind,src="$PWD",dst=/workspace,readonly \
            --mount type=bind,src="$PWD/out/plan/channel-plan.json",dst=/input/channel-plan.json,readonly \
            --mount type=bind,src="$PWD/.cache/sources/llvm-project.tar.xz",dst=/input/llvm-project.tar.xz,readonly \
            --mount type=bind,src="$PWD/.cache/bootstrap",dst=/opt/clangup-bootstrap,readonly \
            --mount type=bind,src="$PWD/.cache/build-${{ matrix.arch }}",dst=/build \
            --mount type=bind,src="$PWD/out/${{ matrix.triple }}",dst=/out \
            -e CLANGUP_BUILD_COMMIT=${{ github.sha }} \
            -e CLANGUP_BUILD_ENVIRONMENT_IDENTITY="$BUILD_ENVIRONMENT_IDENTITY" \
            -e CLANGUP_BOOTSTRAP_KIND=channel-artifact \
            -e CLANGUP_BOOTSTRAP_IDENTITY="$BOOTSTRAP_IDENTITY" \
            "${{ steps.builder.outputs.ref }}" \
            python3 /workspace/channels/build/run.py --plan /input/channel-plan.json --target "${{ matrix.triple }}" --source /input/llvm-project.tar.xz --channel-root "/workspace/$CHANNEL_ROOT" --config-dir "/workspace/$CHANNEL_ROOT/build" --work /build/work --output /out --jobs "$(nproc)" --link-jobs 2 --source-date-epoch "$SOURCE_DATE_EPOCH"
      - name: Verify baseline
        run: |
          mkdir -p verify/prefix
          tar --use-compress-program=unzstd -xf out/${{ matrix.triple }}/toolchain.tar.zst -C verify/prefix
          docker run --rm --network host --mount type=bind,src="$PWD/verify/prefix",dst=/opt/clangup,readonly --mount type=bind,src="$PWD",dst=/workspace,readonly "${{ matrix.verify_image }}" bash "/workspace/$CHANNEL_ROOT/build/verify-linux.sh" /opt/clangup "${{ matrix.profile }}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: libcxx-target-${{ matrix.triple }}
          path: out/${{ matrix.triple }}/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: linux
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: libcxx-target-*
          path: out/targets
      - name: Assemble release
        run: python3 channels/build/assemble.py --targets out/targets --output out/release
      - name: Publish release
        env:
          UPLOAD_ENDPOINT: ${{ vars.CLANGUP_UPLOAD_ENDPOINT }}
        run: |
          token="$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=clangup-r2-uploader" | python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])')"
          python3 channels/build/publish.py --endpoint "$UPLOAD_ENDPOINT" --token "$token" --release out/release/release.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: libcxx-release
          path: out/release/release.json
          if-no-files-found: error
          retention-days: 14
