name: seed-clang image

on:
  workflow_dispatch:
    inputs:
      builder_version:
        description: clangup-builder tag suffix to build on top of (e.g. v1)
        type: string
        default: v1

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/clangup-seed-clang
  BUILDER_REPO: ${{ github.repository_owner }}/clangup-builder

jobs:
  build:
    name: build ${{ matrix.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: el7-x86_64
            profile: el7
            platform: linux/amd64
            runner: ubuntu-24.04
            builder_tag: el7-glibc2.17
          - tag: el8-aarch64
            profile: el8
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            builder_tag: el8-aarch64-glibc2.28
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image refs (lowercase)
        id: img
        run: |
          echo "ref=${REGISTRY}/${IMAGE_REPO,,}" >> "$GITHUB_OUTPUT"
          echo "builder_ref=${REGISTRY}/${BUILDER_REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Extract LLVM version from Dockerfile
        id: llvm
        run: |
          set -euo pipefail
          v=$(grep -oP 'llvm-project-\K[0-9]+\.[0-9]+\.[0-9]+' docker/seed-clang/Dockerfile | head -n1)
          test -n "$v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/seed-clang/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            BASE_IMAGE=${{ steps.img.outputs.builder_ref }}:${{ matrix.builder_tag }}-${{ inputs.builder_version }}
            BASE_PROFILE=${{ matrix.profile }}
          tags: ${{ steps.img.outputs.ref }}:llvmorg-${{ steps.llvm.outputs.version }}-${{ matrix.tag }}
          push: true
