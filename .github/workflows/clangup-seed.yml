name: clangup-seed image

on:
  pull_request:
    paths:
      - .github/workflows/clangup-seed.yml
      - docker/clangup-seed/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/clangup-seed.yml
      - docker/clangup-seed/**
  workflow_dispatch:
    inputs:
      release:
        description: Packaging release appended to the LLVM version
        type: string
        required: true
        default: "1"
      builder_version:
        description: Immutable clangup-builder revision used as the base
        type: string
        required: true
        default: "1"

concurrency:
  group: clangup-seed-${{ github.event_name == 'workflow_dispatch' && 'publish' || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  REGISTRY: ghcr.io
  BUILDER_REPO: ${{ github.repository_owner }}/clangup-builder
  IMAGE_REPO: ${{ github.repository_owner }}/clangup-seed
  LLVM_VERSION: 22.1.8

jobs:
  check:
    name: check seed Dockerfile
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Check Dockerfile
        run: |
          docker buildx build --check \
            --build-arg BASE_IMAGE=quay.io/centos/centos:7 \
            --build-arg BASE_PROFILE=el7 \
            -f docker/clangup-seed/Dockerfile .

  publish:
    name: build ${{ matrix.platform }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: el7
            platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-24.04
          - profile: el8
            platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Validate revisions
        env:
          RELEASE: ${{ inputs.release }}
          BUILDER_VERSION: ${{ inputs.builder_version }}
        run: |
          if [[ ! "$RELEASE" =~ ^[1-9][0-9]*$ ]]; then
            echo "release must be a positive integer: $RELEASE" >&2
            exit 1
          fi
          if [[ ! "$BUILDER_VERSION" =~ ^[1-9][0-9]*$ ]]; then
            echo "builder version must be a positive integer: $BUILDER_VERSION" >&2
            exit 1
          fi

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h
          docker system df

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image refs
        id: image
        env:
          BUILDER_VERSION: ${{ inputs.builder_version }}
        run: |
          registry="${REGISTRY,,}"
          builder_repo="${BUILDER_REPO,,}"
          image_repo="${IMAGE_REPO,,}"
          base_tag="${registry}/${builder_repo}:${BUILDER_VERSION}"
          base_digest="$(docker buildx imagetools inspect "$base_tag" --format '{{json .Manifest}}' | jq -er .digest)"
          echo "base=${registry}/${builder_repo}@${base_digest}" >> "$GITHUB_OUTPUT"
          echo "name=${registry}/${image_repo}" >> "$GITHUB_OUTPUT"

      - name: Refuse to overwrite an existing tag
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          RELEASE: ${{ inputs.release }}
        run: |
          ref="${IMAGE_NAME}:${LLVM_VERSION}-${RELEASE}"
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            echo "image tag already exists: $ref" >&2
            exit 1
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/clangup-seed/Dockerfile
          platforms: ${{ matrix.platform }}
          network: host
          provenance: false
          build-args: |
            BASE_IMAGE=${{ steps.image.outputs.base }}
            BASE_PROFILE=${{ matrix.profile }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=clangup-seed-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=clangup-seed-${{ matrix.platform_pair }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: publish multi-architecture image
    if: github.event_name == 'workflow_dispatch'
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create image index
        env:
          RELEASE: ${{ inputs.release }}
        run: |
          image="${REGISTRY}/${IMAGE_REPO,,}"
          ref="${image}:${LLVM_VERSION}-${RELEASE}"
          latest="${image}:latest"
          # Recheck after the platform builds to close the publish race.
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            echo "image tag already exists: $ref" >&2
            exit 1
          fi

          refs=()
          for file in /tmp/digests/*; do
            refs+=("${image}@sha256:${file##*/}")
          done
          if [[ "${#refs[@]}" -ne 2 ]]; then
            echo "expected two platform digests, got ${#refs[@]}" >&2
            exit 1
          fi

          docker buildx imagetools create --tag "$ref" --tag "$latest" "${refs[@]}"
          actual="$(docker buildx imagetools inspect "$ref" --raw |
            jq -c '[.manifests[].platform | .os + "/" + .architecture] | sort')"
          expected='["linux/amd64","linux/arm64"]'
          if [[ "$actual" != "$expected" ]]; then
            echo "unexpected platform set for $ref: $actual" >&2
            exit 1
          fi
          digest="$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest}}' |
            jq -er .digest)"
          latest_digest="$(docker buildx imagetools inspect "$latest" --format '{{json .Manifest}}' |
            jq -er .digest)"
          if [[ "$latest_digest" != "$digest" ]]; then
            echo "latest digest mismatch: $latest_digest != $digest" >&2
            exit 1
          fi
          echo "### ${ref}@${digest}" >> "$GITHUB_STEP_SUMMARY"
          echo "### ${latest}@${digest}" >> "$GITHUB_STEP_SUMMARY"
