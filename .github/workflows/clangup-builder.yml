name: clangup-builder image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version suffix appended to the image tag (e.g. v1)
        type: string
        default: v1

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/clangup-builder

jobs:
  build:
    name: build ${{ matrix.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: el7-glibc2.17
            profile: el7
            platform: linux/amd64
            runner: ubuntu-24.04
            base_image: quay.io/centos/centos:7
          - tag: el8-aarch64-glibc2.28
            profile: el8
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            base_image: quay.io/centos/centos:8
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref (lowercase)
        id: img
        run: echo "ref=${REGISTRY}/${IMAGE_REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/clangup-builder/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BASE_PROFILE=${{ matrix.profile }}
          tags: ${{ steps.img.outputs.ref }}:${{ matrix.tag }}-${{ inputs.version }}
          push: true
          cache-from: type=gha,scope=clangup-builder-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=clangup-builder-${{ matrix.tag }}
