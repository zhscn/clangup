name: clangup-builder image

on:
  pull_request:
    paths:
      - .github/workflows/clangup-builder.yml
      - docker/clangup-builder/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/clangup-builder.yml
      - docker/clangup-builder/**
  workflow_dispatch:
    inputs:
      version:
        description: Version suffix appended to the image tag (e.g. v1)
        type: string
        required: true
        default: v1

concurrency:
  group: clangup-builder-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/clangup-builder

jobs:
  check:
    name: check ${{ matrix.profile }} Dockerfile
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: el7
            base_image: quay.io/centos/centos@sha256:e4ca2ed0202e76be184e75fb26d14bf974193579039d5573fb2348664deef76e
          - profile: el8
            base_image: quay.io/centos/centos@sha256:ec16f510e8cd1cceeddc6888fcb37c6d6b7c6863fbc70bdbe660a8ccad4bab6a
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Check Dockerfile
        run: |
          docker buildx build --check \
            --build-arg "BASE_IMAGE=${{ matrix.base_image }}" \
            --build-arg "BASE_PROFILE=${{ matrix.profile }}" \
            -f docker/clangup-builder/Dockerfile .

  publish:
    name: publish ${{ matrix.tag }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: el7-glibc2.17
            profile: el7
            platform: linux/amd64
            runner: ubuntu-24.04
            base_image: quay.io/centos/centos@sha256:e4ca2ed0202e76be184e75fb26d14bf974193579039d5573fb2348664deef76e
          - tag: el8-aarch64-glibc2.28
            profile: el8
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            base_image: quay.io/centos/centos@sha256:ec16f510e8cd1cceeddc6888fcb37c6d6b7c6863fbc70bdbe660a8ccad4bab6a
    steps:
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[1-9][0-9]*$ ]]; then
            echo "version must match v[1-9][0-9]*" >&2
            exit 1
          fi

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h
          docker system df

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image ref
        id: image
        env:
          VERSION: ${{ inputs.version }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          ref="${REGISTRY}/${IMAGE_REPO,,}:${IMAGE_TAG}-${VERSION}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Refuse to overwrite an existing tag
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          if docker buildx imagetools inspect "$IMAGE_REF" >/dev/null 2>&1; then
            echo "image tag already exists: $IMAGE_REF" >&2
            exit 1
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/clangup-builder/Dockerfile
          platforms: ${{ matrix.platform }}
          network: host
          provenance: false
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BASE_PROFILE=${{ matrix.profile }}
          tags: ${{ steps.image.outputs.ref }}
          push: true
          cache-from: type=gha,scope=clangup-builder-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=clangup-builder-${{ matrix.tag }}

      - name: Record published digest
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "### ${IMAGE_REF}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
