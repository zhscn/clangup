name: migrate default release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  upload:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download existing release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: 29181017284
          name: default-release-bundle
          path: out/default-release-bundle

      - name: Upload release objects
        env:
          UPLOAD_ENDPOINT: ${{ vars.CLANGUP_UPLOAD_ENDPOINT }}
        run: |
          test -n "$UPLOAD_ENDPOINT"
          export CLANGUP_UPLOAD_TOKEN="$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=clangup-r2-uploader" |
            python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])')"
          python3 tools/repository/upload-release-bundle.py \
            out/default-release-bundle \
            --presign-endpoint "$UPLOAD_ENDPOINT" \
            --jobs 3

      - name: Upload release descriptor
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: migrated-default-release
          path: out/default-release-bundle/release.json
          if-no-files-found: error
          retention-days: 1
