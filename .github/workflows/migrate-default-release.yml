name: migrate default release

on:
  workflow_dispatch:

concurrency:
  group: default-channel
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: "29181017284"
          name: default-release-bundle
          path: out/legacy
      - name: Convert legacy release
        run: python3 channels/default/22.1.8/build/import_legacy.py --bundle out/legacy --output out/release
      - name: Publish release
        env:
          UPLOAD_ENDPOINT: ${{ vars.CLANGUP_UPLOAD_ENDPOINT }}
        run: |
          token="$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=clangup-r2-uploader" | python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])')"
          python3 channels/default/22.1.8/build/publish.py --endpoint "$UPLOAD_ENDPOINT" --token "$token" --release out/release/release.json
